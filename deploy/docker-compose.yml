# Gantry local backend dev stack (see docs/ARCHITECTURE.md).
#
#   NATS/JetStream  - the write-ahead log / component backbone
#   ClickHouse      - backend telemetry store (high-rate time series)
#   Postgres        - backend control plane (tenants, users, devices, dashboards)
#   MinIO           - S3-compatible blob store (Parquet segments); GCS in cloud
#
# All creds here are DEV-ONLY and intentionally weak. Do not reuse anywhere real.
#
#   just compose-up      # start
#   docker compose -f deploy/docker-compose.yml up -d --wait
#   docker compose -f deploy/docker-compose.yml ps
#   just compose-down    # stop (keeps volumes)

name: gantry

services:
  # -------------------------------------------------------------------------
  # NATS + JetStream: backbone between our own components + Edge<->Backend sync.
  # Config (jetstream + leafnodes) lives in deploy/nats/nats.conf.
  # -------------------------------------------------------------------------
  nats:
    image: nats:2.11.4-alpine
    container_name: gantry-nats
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222" # client connections
      - "8222:8222" # http monitoring (/varz, /healthz, /jsz)
      - "7422:7422" # leaf nodes (Edge connects here in a later milestone)
    volumes:
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # ClickHouse: backend telemetry store. Single node for local dev.
  # Creates the `gantry` database on first boot via CLICKHOUSE_DB.
  # -------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: gantry-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: gantry
      # Dev-only: allow the default user to connect with no password from anywhere.
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123" # http interface
      - "9000:9000" # native protocol
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # -------------------------------------------------------------------------
  # Postgres: backend control plane. DEV-ONLY creds gantry/gantry/gantry.
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:17.2-alpine
    container_name: gantry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gantry # dev-only
      POSTGRES_PASSWORD: gantry # dev-only
      POSTGRES_DB: gantry # dev-only
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "gantry", "-d", "gantry"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # MinIO: S3-compatible blob store for Parquet segments (GCS in cloud).
  # Host ports are shifted to 9100/9101 so the S3 port doesn't clash with
  # ClickHouse's native 9000. Inside the container MinIO still uses 9000/9001.
  # -------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: gantry-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin # dev-only
      MINIO_ROOT_PASSWORD: minioadmin # dev-only
    ports:
      - "9100:9000" # S3 API   (host 9100 -> container 9000)
      - "9101:9001" # console  (host 9101 -> container 9001)
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # One-shot: create the gantry-segments bucket, then exit. Not a long-running
  # service (restart: "no"), so `--wait` treats a clean exit as success.
  # -------------------------------------------------------------------------
  minio-setup:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    container_name: gantry-minio-setup
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/gantry-segments &&
      echo 'bucket gantry-segments ready'
      "

volumes:
  nats-data:
  clickhouse-data:
  postgres-data:
  minio-data:
