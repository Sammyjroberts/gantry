# Gantry local NATS/JetStream server config (dev).
# JetStream is the write-ahead log for the backend (see docs/ARCHITECTURE.md).
# Edge will connect to this server as a leaf node in a later milestone; the
# leafnodes listener is wired now so that wiring is ready ahead of time.

server_name: gantry-nats

# Client connections.
port: 4222

# HTTP monitoring endpoint (/varz, /healthz, /jsz).
http_port: 8222

# JetStream: file-backed store inside the container. The store dir is a named
# volume mounted at /data (see docker-compose.yml) so streams survive restarts.
jetstream {
  store_dir: /data/jetstream
  max_memory_store: 1GB
  max_file_store: 10GB
}

# Leaf node listener. Edge (embedded NATS) connects outbound to this port to
# form the Edge<->Backend sync fabric. No auth here because this is a local
# dev stack only; cloud/edge deployments add credentials + TLS.
leafnodes {
  port: 7422
}
