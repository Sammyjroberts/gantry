name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new push to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # DuckDB CLI pinned so the embedded-SQL tier is tested against a known build.
  # Bump deliberately; the actions/cache key is derived from this.
  DUCKDB_VERSION: "1.1.3"

jobs:
  # ---------------------------------------------------------------------------
  # Detect which parts of the monorepo changed so language jobs only run when
  # their inputs move. proto -> {go, web, e2e} because it regenerates bindings.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      proto: ${{ steps.filter.outputs.proto }}
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
      e2e: ${{ steps.filter.outputs.e2e }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            proto:
              - 'proto/**'
              - 'buf.yaml'
              - 'buf.gen.yaml'
              - '.github/workflows/ci.yml'
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'gen/go/**'
              - 'proto/**'
              - '.github/workflows/ci.yml'
            rust:
              - 'sdk/**'
              - 'proto/**'
              - '.github/workflows/ci.yml'
            web:
              - 'apps/web/**'
              - 'core/ts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'
            e2e:
              - 'apps/web/**'
              - 'core/ts/**'
              - 'apps/bench/**'
              - 'core/go/**'
              - 'gen/go/**'
              - 'proto/**'
              - 'e2e/**'
              - 'go.mod'
              - 'go.sum'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'
            python:
              - 'examples/so101/**'
              - 'adapters/foxglove/**'
              - '.github/workflows/ci.yml'

  # ---------------------------------------------------------------------------
  # Proto: contracts are the single source of truth. Lint + format check.
  # ---------------------------------------------------------------------------
  proto:
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}
      - name: buf lint
        run: buf lint
      - name: buf format check
        run: buf format --diff --exit-code

  # ---------------------------------------------------------------------------
  # Go: shared engine (core/go) + apps (bench, cloud). Build, vet, race-test.
  # ubuntu runners ship gcc, so we run the whole suite under -race (the Windows
  # bench box can't — no C toolchain — so this is where data races are caught).
  # A pinned DuckDB CLI is provisioned + GANTRY_DUCKDB exported so the embedded
  # SQL integration tests (duckdb engine + bench /sql end-to-end) actually RUN
  # instead of skipping.
  # ---------------------------------------------------------------------------
  go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache DuckDB CLI
        uses: actions/cache@v4
        with:
          path: ~/.local/duckdb
          key: duckdb-${{ runner.os }}-${{ env.DUCKDB_VERSION }}
      - name: Provision DuckDB
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/duckdb"
          if [ ! -x "$HOME/.local/duckdb/duckdb" ]; then
            curl -fsSL -o /tmp/duckdb.zip \
              "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
            unzip -o /tmp/duckdb.zip -d "$HOME/.local/duckdb"
            chmod +x "$HOME/.local/duckdb/duckdb"
          fi
          echo "GANTRY_DUCKDB=$HOME/.local/duckdb/duckdb" >> "$GITHUB_ENV"
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...
      - name: go test (race + duckdb)
        run: go test -race ./...

  # ---------------------------------------------------------------------------
  # Rust: the Edge SDK (cargo workspace in sdk/). Adds the tlm ENABLED-feature
  # suite, the no_std MCU-target builds, and the serial-agent → real-Bench e2e
  # (which builds the Go bench binary, so a Go toolchain is added here too).
  # ---------------------------------------------------------------------------
  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      # serialport (gantry-serial-agent) links libudev on Linux.
      - name: install libudev
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk
      # Go is needed by the serial-agent e2e (it builds ./apps/bench/cmd/bench).
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: cargo fmt check
        run: cargo fmt --all --check
      - name: cargo build
        run: cargo build --workspace
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - name: cargo test (workspace, tlm disabled default)
        run: cargo test --workspace
      - name: cargo test (tlm enabled feature)
        run: cargo test -p gantry-tlm --features enabled
      - name: no_std MCU builds (thumbv7em-none-eabi)
        run: |
          cargo build -p gantry-wire --no-default-features --target thumbv7em-none-eabi
          cargo build -p gantry-tlm --no-default-features --features enabled --target thumbv7em-none-eabi
      - name: serial-agent e2e (builds + drives real Bench)
        run: cargo test -p gantry-serial-agent --test e2e_edge -- --ignored

  # ---------------------------------------------------------------------------
  # Web: TS/React console + shared TS packages (pnpm workspace).
  # ---------------------------------------------------------------------------
  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: pnpm build
        run: pnpm -r build
      - name: pnpm test
        run: pnpm -r test

  # ---------------------------------------------------------------------------
  # Browser e2e: the real bench binary + a Node telemetry feeder driven through
  # Playwright/Chromium against the production web build. Needs Go (bench build),
  # Node/pnpm (web build + harness), a cached Chromium, and a pinned DuckDB so
  # the SQL-console spec runs. Traces/report uploaded on failure.
  # ---------------------------------------------------------------------------
  e2e:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache DuckDB CLI
        uses: actions/cache@v4
        with:
          path: ~/.local/duckdb
          key: duckdb-${{ runner.os }}-${{ env.DUCKDB_VERSION }}
      - name: Provision DuckDB
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/duckdb"
          if [ ! -x "$HOME/.local/duckdb/duckdb" ]; then
            curl -fsSL -o /tmp/duckdb.zip \
              "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
            unzip -o /tmp/duckdb.zip -d "$HOME/.local/duckdb"
            chmod +x "$HOME/.local/duckdb/duckdb"
          fi
          echo "GANTRY_DUCKDB=$HOME/.local/duckdb/duckdb" >> "$GITHUB_ENV"
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: Build web console
        run: pnpm -r build
      - name: e2e deps
        working-directory: e2e
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
      - name: Install Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: Run Playwright suite
        working-directory: e2e
        run: npm test
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Python: the SO-101 kit (examples/so101) — protocol codec, pairing, publisher
  # unit tests. No hardware, no network (fixtures + mocked urlopen).
  # ---------------------------------------------------------------------------
  python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install test deps
        run: pip install pyserial pytest websockets av numpy
      - name: pytest so101 kit
        run: python -m pytest examples/so101 -q
      - name: pytest foxglove adapter
        run: python -m pytest adapters/foxglove -q

  # ---------------------------------------------------------------------------
  # Aggregate gate: a single required check that passes only if no needed job
  # failed. Skipped (unchanged) jobs are OK; failed/cancelled ones are not.
  # ---------------------------------------------------------------------------
  ci:
    needs: [proto, go, rust, web, e2e, python]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no job failed
        run: |
          results='${{ needs.proto.result }} ${{ needs.go.result }} ${{ needs.rust.result }} ${{ needs.web.result }} ${{ needs.e2e.result }} ${{ needs.python.result }}'
          echo "job results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "A required job did not pass."
              exit 1
            fi
          done
          echo "All required jobs passed or were skipped."
