syntax = "proto3";

package gantry.v1;

import "gantry/v1/telemetry.proto";

// Telemetry ingest. Exposed identically by Bench and Cloud — emitters do not
// care which one they are talking to. Served over ConnectRPC, so plain
// HTTP POST + JSON works alongside gRPC.
service IngestService {
  // Publish one batch of frames. Ack means durably accepted (written to the
  // stream), not merely received.
  rpc PublishBatch(PublishBatchRequest) returns (PublishBatchResponse);

  // Register or update channel metadata for a device.
  rpc RegisterChannels(RegisterChannelsRequest) returns (RegisterChannelsResponse);
}

message PublishBatchRequest {
  FrameBatch batch = 1;
}

message PublishBatchResponse {
  // Highest per-device sequence durably accepted so far. Lets emitters with
  // local buffers trim through this point.
  uint64 acked_sequence = 1;
}

message RegisterChannelsRequest {
  string device_id = 1;
  repeated ChannelInfo channels = 2;
}

message RegisterChannelsResponse {}
