syntax = "proto3";

package gantry.v1;

// The kind of value a channel carries.
enum ValueKind {
  VALUE_KIND_UNSPECIFIED = 0;
  VALUE_KIND_F64 = 1;
  VALUE_KIND_I64 = 2;
  VALUE_KIND_BOOL = 3;
  VALUE_KIND_TEXT = 4;
  VALUE_KIND_RAW = 5;
}

// A single telemetry value. Kept as a oneof so constrained emitters pay only
// for what they send.
message Value {
  oneof kind {
    double f64 = 1;
    sint64 i64 = 2;
    bool flag = 3;
    string text = 4;
    bytes raw = 5;
  }
}

// One sample on one channel at one instant.
message Frame {
  // Canonical channel (param) name, e.g. "pitch_deg" within packet "imu",
  // or a full dot-path for ad-hoc channels. Lowercase tokens by convention.
  string channel = 1;
  // Nanoseconds since Unix epoch, as stamped by the emitter.
  fixed64 timestamp_ns = 2;
  Value value = 3;
  // Packet (telemetry struct) this channel belongs to. Empty for ad-hoc
  // channels. Packets are first-class: storage keys on (packet, param).
  string packet = 4;
  // Emitting device. Populated by the SERVER on outbound live streams so
  // multi-device subscriptions are attributable; emitters may leave it empty
  // on ingest (FrameBatch.device_id is authoritative there).
  string device_id = 5;
}

// The unit of transmission: a batch of frames from one device.
message FrameBatch {
  // Stable identifier of the emitting device/process.
  string device_id = 1;
  // Monotonically increasing per-device batch sequence number, for dedup and
  // gap detection across lossy links.
  uint64 sequence = 2;
  repeated Frame frames = 3;
  // Stamped by the INGEST SERVER at acceptance (emitters leave it zero).
  // Frame.timestamp_ns is measurement time; this is arrival time — the two
  // diverge under store-and-forward (a spool replayed hours later) and their
  // difference is the end-to-end latency. Persisted alongside samples.
  fixed64 received_ns = 4;
}

// Channel metadata, registered ahead of or alongside data.
message ChannelInfo {
  string name = 1;
  ValueKind kind = 2;
  // Unit string, e.g. "A", "m/s", "degC". Free-form but conventional.
  string unit = 3;
  string description = 4;
  // Packet (telemetry struct) this channel belongs to; empty for ad-hoc.
  string packet = 5;
}
